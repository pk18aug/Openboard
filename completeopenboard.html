<script>

    let pencil = document.querySelector("#pencil");
    let eraser = document.querySelector("#eraser");
    let glassrect = document.querySelector("#glassrect");
    let Download = document.querySelector("#Download");
    let option = document.querySelectorAll(".size-box");

    let Dsizer = "pencil";
    pencil.addEventListener("click" , function(e){


            if(Dsizer=="pencil"){

                option[0].style.display = "flex";
            }else {
                
   for(let i=0; i<option.length;i++){
    option[i].style.display = "none";
   }
   let Dsizer = "pencil";     
            }   
           

    })
    
    eraser.addEventListener("click" , function(e){

if(Dsizer=="eraser"){

    option[1].style.display = "flex";
    
}else{
   
   Dsizer = "eraser";
   eraser.style.border = " 1px solid black";
   for(let i=0; i<option.length;i++){
       option[i].style.display = "none";
   }
        
}

})


glassrect.addEventListener("click" , function(e){

if(Dsizer=="glassrect"){

    option[2].style.display="flex";
}else{
   
   Dsizer = "glassrect";
   glassrect.style.border = " 1px solid black";
   for(let i=0; i<option.length;i++){
       option[i].style.display = "none";
   }
        
}

})
Download.addEventListener("click" , function(e){

if(Dsizer=="Download"){

    option[3].style.display = "flex";
}else{
   
   Dsizer = "Download";
   Download.style.border = " 1px solid black";
   for(let i=0; i<option.length;i++){
       option[i].style.display = "none";
   }
        
}

})


</script>
